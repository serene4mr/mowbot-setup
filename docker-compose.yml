services:
  mowbot_gui:
    image: ghcr.io/serene4mr/mowbot-gui:latest
    container_name: mowbot_gui
    network_mode: host
    privileged: true
    group_add:
      - "133"
    environment:
      # If started by systemd, DISPLAY might be empty, so we default to :0
      - DISPLAY=${DISPLAY:-:0}
      - MBGUI_CONFIG=/etc/mowbot_data/gui/config.yaml
      - QTWEBENGINE_DISABLE_SANDBOX=1
    volumes:
      - /dev:/dev
      - /dev/shm:/dev/shm
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/mowbot_data:/etc/mowbot_data
    # restart: always
    command: [ "python3", "/mowbot-gui/src/main.py" ]

  mowbot_uros_agent:
    image: microros/micro-ros-agent:humble
    container_name: mowbot_uros_agent
    network_mode: host
    stdin_open: true
    tty: true
    command:
      - udp4
      - --port
      - "8888"

  mowbot_bringup_and_sensing:
    image: ghcr.io/serene4mr/mowbot:main-cuda-latest
    container_name: mowbot_bringup_and_sensing
    # Keep the image's entrypoint (likely does ROS setup); only override command.
    environment:
      - ROS_DISTRO=${ROS_DISTRO:-humble}
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0 # ensure DDS not restricted to loopback
      # - RMW_IMPLEMENTATION=rmw_fastrtps_cpp  # uncomment if you want to force
    volumes:
      - ${HOME}/mowbot_data:/etc/mowbot_data
      - /dev:/dev
    network_mode: host
    ipc: host # share host SHM for Fast DDS/Cyclone DDS
    pid: host # optional but recommended with SHM
    privileged: true
    command:
      - bash
      - -lc
      - |
        # Escape $ so Compose doesn't interpolate at parse-time; container bash expands it.
        source /opt/ros/$$ROS_DISTRO/setup.bash && \
        source /opt/mowbot/setup.bash && \
        # debug: show ROS env
        env | grep -E 'ROS_|RMW' || true
        # launch bringup and sensing
        ros2 launch mowbot_launch mowbot.launch.py \
          robot_id:=${MB_ROBOT_ID:-mowbot_001} \
          manufacturer:=${MB_MANUFACTURER:-MowbotTech} \
          robot_model:=${MB_ROBOT_MODEL:-mowbot_model_t2} \
          sensor_model:=${MB_SENSOR_MODEL:-mowbot_sensor_kit_t2} \
          data_path:=/etc/mowbot_data \
          launch_robot:=true launch_sensing:=true launch_sensing_driver:=true \
          launch_localization:=false launch_nav2:=false launch_app:=false

  mowbot_localization:
    image: ghcr.io/serene4mr/mowbot:main-cuda-latest
    container_name: mowbot_localization
    environment:
      - ROS_DISTRO=${ROS_DISTRO:-humble}
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      # - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    volumes:
      - ${HOME}/mowbot_data:/etc/mowbot_data
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    command:
      - bash
      - -lc
      - |
        # Escape $ so Compose doesn't interpolate at parse-time; container bash expands it.
        source /opt/ros/$$ROS_DISTRO/setup.bash
        env | grep -E 'ROS_|RMW' || true
        ros2 launch mowbot_launch mowbot.launch.py \
          robot_id:=${MB_ROBOT_ID:-mowbot_001} \
          manufacturer:=${MB_MANUFACTURER:-MowbotTech} \
          robot_model:=${MB_ROBOT_MODEL:-mowbot_model_t2} \
          sensor_model:=${MB_SENSOR_MODEL:-mowbot_sensor_kit_t2} \
          data_path:=/etc/mowbot_data \
          launch_robot:=false launch_sensing:=false launch_sensing_driver:=false \
          launch_localization:=true launch_nav2:=false launch_app:=false

  mowbot_navigation:
    image: ghcr.io/serene4mr/mowbot:main-cuda-latest
    container_name: mowbot_navigation
    environment:
      - ROS_DISTRO=${ROS_DISTRO:-humble}
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      # - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    volumes:
      - ${HOME}/mowbot_data:/etc/mowbot_data
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    command:
      - bash
      - -lc
      - |
        # Escape $ so Compose doesn't interpolate at parse-time; container bash expands it.
        source /opt/ros/$$ROS_DISTRO/setup.bash
        env | grep -E 'ROS_|RMW' || true
        export ROS_DOMAIN_ID=0
        ros2 launch mowbot_launch mowbot.launch.py \
          robot_id:=${MB_ROBOT_ID:-mowbot_001} \
          manufacturer:=${MB_MANUFACTURER:-MowbotTech} \
          robot_model:=${MB_ROBOT_MODEL:-mowbot_model_t2} \
          sensor_model:=${MB_SENSOR_MODEL:-mowbot_sensor_kit_t2} \
          data_path:=/etc/mowbot_data \
          launch_robot:=false launch_sensing:=false launch_sensing_driver:=false \
          launch_localization:=false launch_nav2:=true launch_app:=false

  mowbot_app:
    image: ghcr.io/serene4mr/mowbot:main-cuda-latest
    container_name: mowbot_app
    environment:
      - ROS_DISTRO=${ROS_DISTRO:-humble}
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      # - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    volumes:
      - ${HOME}/mowbot_data:/etc/mowbot_data
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    command:
      - bash
      - -lc
      - |
        # Escape $ so Compose doesn't interpolate at parse-time; container bash expands it.
        source /opt/ros/$$ROS_DISTRO/setup.bash
        env | grep -E 'ROS_|RMW' || true
        ros2 launch mowbot_launch mowbot.launch.py \
          robot_id:=${MB_ROBOT_ID:-mowbot_001} \
          manufacturer:=${MB_MANUFACTURER:-MowbotTech} \
          robot_model:=${MB_ROBOT_MODEL:-mowbot_model_t2} \
          sensor_model:=${MB_SENSOR_MODEL:-mowbot_sensor_kit_t2} \
          data_path:=/etc/mowbot_data \
          launch_robot:=false launch_sensing:=false launch_sensing_driver:=false \
          launch_localization:=false launch_nav2:=false launch_app:=true
