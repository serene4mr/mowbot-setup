      - |
        # Escape $ so Compose doesn't interpolate at parse-time; container bash expands it.
        source /opt/ros/$$ROS_DISTRO/setup.bash
        env | grep -E 'ROS_|RMW' || true
        ros2 topic pub -r 1 /test_mowbot_app std_msgs/msg/String "{data: 'mowbot_app up'}"
